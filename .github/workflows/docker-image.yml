name: 构建推送

on:
  schedule:
  - cron: "0 0 1 * *"
  workflow_dispatch:


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - image_name: caddy
          upstream_repo: caddyserver/caddy
          docker_repo: qvgz/caddy
        - image_name: supervisord
          upstream_repo: ochinchina/supervisord
          docker_repo: qvgz/supervisord

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Versions
      id: check_version
      run: |
        LATEST_VERSION=$(gh api repos/${{ matrix.upstream_repo }}/releases/latest --jq '.tag_name')
        EXIST_TAG=$(curl -s "https://hub.docker.com/v2/repositories/${{ matrix.docker_repo }}/tags/${LATEST_VERSION}" | jq -r '.name // "not_found"')
        echo "VERSION=${LATEST_VERSION}" >> $GITHUB_OUTPUT
        echo "EXISTS=${EXIST_TAG}" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up QEMU
      if: steps.check_version.outputs.VERSION != steps.check_version.outputs.EXISTS
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: steps.check_version.outputs.VERSION != steps.check_version.outputs.EXISTS
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      if: steps.check_version.outputs.VERSION != steps.check_version.outputs.EXISTS
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      if: steps.check_version.outputs.VERSION != steps.check_version.outputs.EXISTS
      uses: docker/build-push-action@v6
      with:
        context: ./${{ matrix.image_name }}
        file: ./${{ matrix.image_name }}/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        build-args: |
          VERSION=${{ steps.check_version.outputs.VERSION }}
        tags: |
          ${{ matrix.docker_repo }}:latest
          ${{ matrix.docker_repo }}:${{ steps.check_version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
